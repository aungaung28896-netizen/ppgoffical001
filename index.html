<html lang="my">
<head>

    <style>
        :root {
            --primary: #00d2ff;
            --bg-dark: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); 
            margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        /* Navbar */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: center; padding: 15px 0; gap: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 0.8em; font-weight: 600; text-transform: uppercase; }

        header { padding: 110px 20px 10px; text-align: center; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2em, 8vw, 3em); color: var(--primary); margin: 0; text-shadow: 0 0 20px rgba(0,210,255,0.4); }

        /* Search Area */
        .search-container { display: flex; flex-direction: column; align-items: center; padding: 15px 20px; gap: 10px; }
        .search-wrapper { position: relative; width: 100%; max-width: 500px; }
        .search-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.1em; }
        .search-box { 
            width: 100%; padding: 14px 20px 14px 50px; border-radius: 30px; box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); 
            color: white; outline: none; font-size: 16px; transition: 0.3s;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,210,255,0.2); }

        #searchHistory { width: 100%; max-width: 480px; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; justify-content: center; }
        .history-item { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 15px; font-size: 0.7em; cursor: pointer; color: var(--text-dim); transition: 0.2s; }
        .history-item:hover { background: var(--primary); color: #000; }

        /* Container & Grids */
        .container { padding: 10px 15px 100px; max-width: 1200px; margin: 0 auto; }
        .category-title { color: var(--primary); border-left: 4px solid var(--primary); padding-left: 12px; margin: 35px 0 15px; font-size: 1.1em; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .grid-collapsed { max-height: 520px; overflow: hidden; mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); }

        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .movie-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .q-badge { position: absolute; top: 8px; left: 8px; background: var(--primary); color: #000; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; z-index: 5; }
        .movie-info { padding: 10px; text-align: center; font-size: 0.8em; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .toggle-btn { display: block; margin: 20px auto; padding: 10px 25px; background: none; border: 1px solid var(--primary); color: var(--primary); border-radius: 25px; cursor: pointer; font-size: 0.9em; font-weight: 600; }

        /* Floating Buttons */
        .float-btn { position: fixed; right: 20px; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2000; border: none; font-size: 1.4em; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        #backToTop { bottom: 90px; background: var(--primary); color: #000; display: none; }
        #tgContact { bottom: 25px; background: #229ED9; color: #fff; text-decoration: none; }
        .float-btn:active { transform: scale(0.9); }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 15px; box-sizing: border-box; }
        .modal-content { background: #0d1117; width: 100%; max-width: 800px; border-radius: 20px; display: flex; flex-direction: row; overflow: hidden; border: 1px solid var(--primary); position: relative; max-height: 85vh; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .modal-left { width: 45%; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }
        .modal-right { width: 55%; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 35px; color: #fff; cursor: pointer; z-index: 100; }
        .watch-btn { display: block; width: 100%; padding: 16px; background: var(--primary); color: #000; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 800; margin-top: 20px; text-transform: uppercase; }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; }
            .modal-left { height: 250px; width: 100%; }
            .modal-right { width: 100%; padding: 25px; box-sizing: border-box; }
            .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            header h1 { font-size: 2em; }
        }
    </style>
</head>

    let searchHistory = JSON.parse(localStorage.getItem('ppgHistory')) || [];

    function displayMovies() {
        movies.forEach(movie => {
            const gridId = `grid-${movie.category.toLowerCase()}`;
            const grid = document.getElementById(gridId);
            
            if(grid) {
                const card = document.createElement('div');
                card.className = 'movie-card';
                const movieQuality = movie.quality || "HD";
                const movieImg = movie.img || "https://via.placeholder.com/150?text=No+Image";

                card.innerHTML = `<div class="q-badge">${movieQuality}</div><img src="${movieImg}" onerror="this.src='https://via.placeholder.com/150?text=Error'"><div class="movie-info">${movie.title}</div>`;
                card.onclick = () => openM(movie);
                grid.appendChild(card);
            }
        });
        updateHistoryUI();
    }

    function openM(m) {
        document.getElementById('mImg').src = m.img || "";
        document.getElementById('mTitle').innerText = m.title || "No Title";
        document.getElementById('mRate').innerText = m.rating ? `⭐ ${m.rating}` : "⭐ 0.0";
        document.getElementById('mQual').innerText = m.quality || "HD";
        document.getElementById('mDesc').innerText = m.description || "No description available.";
        document.getElementById('mLink').href = m.link || "#";
        document.getElementById('movieModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeM() {
        document.getElementById('movieModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function toggleGrid(id, btn) {
        const grid = document.getElementById(id);
        grid.classList.toggle('grid-collapsed');
        btn.innerText = grid.classList.contains('grid-collapsed') ? "View More" : "Show Less";
    }

    function doSearch(e) {
        const query = document.getElementById('searchBox').value.toLowerCase();
        const cards = document.querySelectorAll('.movie-card');
        
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(query) ? "block" : "none";
        });

        if (e && e.key === 'Enter' && query.trim() !== "") {
            saveToHistory(query.trim());
        }

        const btns = document.querySelectorAll('.toggle-btn');
        const grids = document.querySelectorAll('.movie-grid');
        if(query.length > 0) {
            grids.forEach(g => g.classList.remove('grid-collapsed'));
            btns.forEach(b => b.style.display = 'none');
        } else {
            grids.forEach(g => g.classList.add('grid-collapsed'));
            btns.forEach(b => b.style.display = 'block');
        }
    }

    function saveToHistory(q) {
        if (!searchHistory.includes(q)) {
            searchHistory.unshift(q);
            if (searchHistory.length > 5) searchHistory.pop();
            localStorage.setItem('ppgHistory', JSON.stringify(searchHistory));
            updateHistoryUI();
        }
    }

    function updateHistoryUI() {
        const container = document.getElementById('searchHistory');
        if (container) {
            container.innerHTML = searchHistory.map(h => `<span class="history-item" onclick="quickSearch('${h}')">${h}</span>`).join('');
        }
    }

    function quickSearch(val) {
        document.getElementById('searchBox').value = val;
        doSearch();
    }

    window.onscroll = function() {
        const btt = document.getElementById('backToTop');
        if (btt) {
            btt.style.display = window.scrollY > 400 ? 'flex' : 'none';
        }
    };

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Load Data တန်းပြရန်
    window.onload = displayMovies;
</script>
