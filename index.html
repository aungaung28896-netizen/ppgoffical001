<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPGOfficial - All Collections</title>

    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #090b10;
            --card-bg: rgba(22, 27, 34, 0.8);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-glow: rgba(0, 210, 255, 0.4);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body { 
            font-family: 'Segoe UI', 'Noto Sans Myanmar', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 0; 
            scroll-behavior: smooth;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 5% 10%, rgba(0, 210, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 95% 90%, rgba(58, 123, 213, 0.05) 0%, transparent 20%);
        }

        header { 
            padding: 80px 20px 40px; text-align: center; 
            background: linear-gradient(to bottom, #161b22, var(--bg-dark));
        }
        header h1 { 
            font-size: clamp(2.5em, 8vw, 4.5em); font-weight: 900; margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 4px; filter: drop-shadow(0 0 15px var(--accent-glow));
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px var(--accent-glow)); }
            to { filter: drop-shadow(0 0 20px var(--primary)); }
        }

        nav { 
            position: sticky; top: 0; z-index: 1000;
            background: rgba(9, 11, 16, 0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: center; padding: 15px; gap: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); overflow-x: auto;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        nav a { 
            color: var(--text-dim); text-decoration: none; padding: 10px 20px; 
            border-radius: 30px; font-size: 0.9em; transition: 0.3s; white-space: nowrap;
        }
        nav a:hover { background: var(--primary); color: #000; font-weight: bold; }

        .search-container { padding: 30px 20px; display: flex; justify-content: center; }
        .search-wrapper { position: relative; width: 100%; max-width: 500px; display: flex; align-items: center; }
        .search-box { 
            width: 100%; padding: 15px 60px 15px 25px; border-radius: 40px; 
            border: 2px solid #30363d; background: #161b22; color: white; 
            outline: none; transition: 0.4s; font-size: 1em;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 25px var(--accent-glow); }
        .search-btn { position: absolute; right: 10px; background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; color: #000; font-size: 1.2rem; }

        .container { padding: 20px; max-width: 1250px; margin: 0 auto; }
        .category-header { display: flex; align-items: center; justify-content: space-between; margin: 40px 0 20px; }
        .category-title { color: var(--primary); font-size: 1.6em; margin: 0; display: flex; align-items: center; gap: 10px; }
        .count-badge { background: rgba(255,255,255,0.1); color: var(--text-dim); padding: 4px 12px; border-radius: 20px; font-size: 0.7em; font-weight: normal; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-grid.collapsed { max-height: 440px; overflow: hidden; mask-image: linear-gradient(to bottom, black 70%, transparent 100%); }

        .movie-card { position: relative; background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer; }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; background: #1a1d23; }
        .quality-badge { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 5px; z-index: 5; }
        .movie-info { padding: 15px; text-align: center; }
        .movie-title { font-size: 0.9em; font-weight: 600; margin-bottom: 12px; height: 1.2em; overflow: hidden; }
        .btn-link { display: block; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; text-decoration: none; padding: 10px; border-radius: 10px; font-size: 0.8em; font-weight: bold; transition: 0.3s; }
        
        .toggle-btn { background: transparent; border: 1px solid #30363d; color: var(--text-dim); padding: 12px 30px; border-radius: 25px; cursor: pointer; transition: 0.3s; margin: 25px auto; display: block; font-weight: bold; }
        #noResult { display: none; text-align: center; padding: 50px 20px; color: var(--text-dim); }
        .floating-tg { position: fixed; bottom: 30px; left: 30px; background: #26A5E4; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(38, 165, 228, 0.4); z-index: 2000; transition: 0.3s; text-decoration: none; font-size: 22px; }
        #backToTop { position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 55px; height: 55px; border-radius: 50%; display: none; justify-content: center; align-items: center; cursor: pointer; z-index: 2000; border: none; font-size: 20px; }

        @media (max-width: 600px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .movie-grid.collapsed { max-height: 800px; }
        }
    </style>
</head>
<body>

<header>
    <h1>PPGOfficial</h1>
    <p style="color: var(--text-dim); margin-top: 10px;">The Ultimate Premium Experience</p>
</header>

<nav>
    <a href="#sec-myanmar">မြန်မာ 🇲🇲</a>
    <a href="#sec-japan">ဂျပန် 🇯🇵</a>
    <a href="#sec-china">တရုတ် 🇨🇳</a>
    <a href="#sec-intl">နိုင်ငံခြား 🌍</a>
</nav>

<div class="search-container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-box" oninput="handleSearch()" placeholder="ဇာတ်ကားအမည်ရိုက်ပြီး ရှာပါ...">
        <button class="search-btn">🔍</button>
    </div>
</div>

<div class="container">
    <div id="noResult">
        <div style="font-size: 3rem; margin-bottom: 10px;">🔍</div>
        <h3>ရှာဖွေမှုမတွေ့ပါ</h3>
    </div>

    <!-- မြန်မာ -->
    <section id="sec-myanmar">
        <div class="category-header">
            <h2 class="category-title">မြန်မာဇာတ်ကားများ <span class="count-badge" id="count-myanmar">0 Movie</span></h2>
        </div>
        <div class="movie-grid collapsed" id="grid-myanmar"></div>
        <button class="toggle-btn" onclick="toggleGrid('grid-myanmar', this)">View More ▼</button>
    </section>

    <!-- ဂျပန် -->
    <section id="sec-japan">
        <div class="category-header">
            <h2 class="category-title">ဂျပန်ဇာတ်ကားများ <span class="count-badge" id="count-japan">0 Movie</span></h2>
        </div>
        <div class="movie-grid collapsed" id="grid-japan"></div>
        <button class="toggle-btn" onclick="toggleGrid('grid-japan', this)">View More ▼</button>
    </section>

    <!-- တရုတ် -->
    <section id="sec-china">
        <div class="category-header">
            <h2 class="category-title">တရုတ်ဇာတ်ကားများ <span class="count-badge" id="count-china">0 Movie</span></h2>
        </div>
        <div class="movie-grid collapsed" id="grid-china"></div>
        <button class="toggle-btn" onclick="toggleGrid('grid-china', this)">View More ▼</button>
    </section>

    <!-- နိုင်ငံခြား -->
    <section id="sec-intl">
        <div class="category-header">
            <h2 class="category-title">နိုင်ငံခြားဇာတ်ကားများ <span class="count-badge" id="count-intl">0 Movie</span></h2>
        </div>
        <div class="movie-grid collapsed" id="grid-intl"></div>
        <button class="toggle-btn" onclick="toggleGrid('grid-intl', this)">View More ▼</button>
    </section>
</div>

<a href="https://t.me/PPGOfficalbot" class="floating-tg" target="_blank">✈️</a>
<button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

<script>
    // ဇာတ်ကားတွေကို JSON ကနေ ဆွဲထုတ်မယ်
    async function loadMovies() {
        try {
            const response = await fetch('movies.json');
            const movies = await response.json();
            
            movies.forEach(movie => {
                const cardHTML = `
                    <div class="movie-card tilt-card" data-title="${movie.title.toLowerCase()}">
                        <span class="quality-badge">${movie.quality}</span>
                        <img src="${movie.img}" alt="${movie.title}" loading="lazy">
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                            <a href="${movie.link}" target="_blank" class="btn-link">Telegram တွင်ကြည့်ရန်</a>
                        </div>
                    </div>
                `;
                const grid = document.getElementById(`grid-${movie.category}`);
                if (grid) grid.innerHTML += cardHTML;
            });
            updateCounts();
            initTilt();
        } catch (e) { console.error("Error loading movies:", e); }
    }

    function updateCounts() {
        ['myanmar', 'japan', 'china', 'intl'].forEach(cat => {
            const count = document.querySelectorAll(`#grid-${cat} .movie-card`).length;
            document.getElementById(`count-${cat}`).innerText = `${count} Movie${count > 1 ? 's' : ''}`;
        });
    }

    function initTilt() {
        document.querySelectorAll('.tilt-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                if (window.innerWidth < 800) return;
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                card.style.transform = `perspective(1000px) rotateY(${x * 20}deg) rotateX(${-y * 20}deg) scale(1.05)`;
            });
            card.addEventListener('mouseleave', () => card.style.transform = ``);
        });
    }

    function toggleGrid(id, btn) {
        const grid = document.getElementById(id);
        const isCollapsed = grid.classList.toggle('collapsed');
        btn.innerText = isCollapsed ? "View More ▼" : "Show Less ▲";
        grid.style.maxHeight = isCollapsed ? "440px" : "none";
        grid.style.maskImage = isCollapsed ? "" : "none";
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.movie-card');
        let hasResult = false;

        cards.forEach(card => {
            const match = card.getAttribute('data-title').includes(q);
            card.style.display = match ? "block" : "none";
            if (match) hasResult = true;
        });

        document.querySelectorAll('section').forEach(sec => {
            const visible = sec.querySelectorAll('.movie-card[style="display: block"]').length > 0;
            sec.style.display = q === "" || visible ? "block" : "none";
            if (q !== "" && visible) {
                const grid = sec.querySelector('.movie-grid');
                grid.classList.remove('collapsed');
                grid.style.maxHeight = "none";
            }
        });
        document.getElementById('noResult').style.display = hasResult || q === "" ? "none" : "block";
    }

    window.onscroll = () => {
        document.getElementById("backToTop").style.display = window.scrollY > 400 ? "flex" : "none";
    };

    window.onload = loadMovies;
</script>
</body>
</html>
