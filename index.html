<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPGOfficial - Ultra Premium Cinema</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* 1. Global Setup */
        body { 
            font-family: 'Inter', 'Segoe UI', 'Noto Sans Myanmar', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 0; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.05), transparent 60%);
            z-index: -1;
            animation: moveGlow 15s infinite alternate ease-in-out;
        }
        @keyframes moveGlow {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.2); }
        }

        /* 2. Navbar */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(5, 7, 10, 0.85); backdrop-filter: blur(20px);
            display: flex; justify-content: center; padding: 15px; gap: 15px; 
            border-bottom: 1px solid var(--glass-border);
            transition: transform 0.4s;
        }
        nav.nav-hide { transform: translateY(-100%); }
        nav a { 
            color: var(--text-dim); text-decoration: none; padding: 8px 18px; 
            border-radius: 20px; font-size: 0.85em; transition: 0.3s;
        }
        nav a:hover { color: var(--primary); background: rgba(0, 210, 255, 0.1); }

        header { padding: 130px 20px 40px; text-align: center; }
        header h1 { 
            font-family: 'Orbitron', sans-serif; font-size: clamp(2.2em, 8vw, 4.5em); margin: 0;
            background: linear-gradient(to right, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--accent-glow));
            letter-spacing: 4px;
        }

        /* 3. Search Box */
        .search-container { padding: 20px; display: flex; justify-content: center; margin-bottom: 40px; }
        .search-wrapper { position: relative; width: 100%; max-width: 600px; }
        .search-box { 
            width: 100%; padding: 18px 25px; border-radius: 50px; 
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); 
            color: white; outline: none; transition: 0.4s; backdrop-filter: blur(10px);
            text-align: center;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 30px var(--accent-glow); }

        /* 4. Movie Grid & Card */
        .container { padding: 20px; max-width: 1300px; margin: 0 auto; }
        .category-title { color: var(--primary); font-size: 1.5em; margin: 40px 0 20px; font-weight: 800; border-left: 4px solid var(--primary); padding-left: 15px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 25px; }
        .movie-grid.collapsed { max-height: 480px; overflow: hidden; mask-image: linear-gradient(to bottom, black 60%, transparent); }

        .movie-card { 
            background: var(--card-bg); border-radius: 18px; border: 1px solid var(--glass-border);
            overflow: hidden; cursor: pointer; transition: 0.4s; position: relative;
        }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow); }
        
        .movie-card img { width: 100%; height: 280px; object-fit: cover; }
        
        .quality-badge {
            position: absolute; top: 12px; left: 12px;
            background: var(--primary); color: #000;
            font-size: 10px; font-weight: 900; padding: 4px 10px;
            border-radius: 6px; text-transform: uppercase;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .quality-badge.new { background: #ffbc00; box-shadow: 0 0 15px rgba(255, 188, 0, 0.4); }

        .movie-info { padding: 15px; text-align: center; }
        .movie-title { font-size: 0.9em; font-weight: 600; color: #fff; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* 5. Enhanced Movie Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px;
        }
        .modal-content {
            background: linear-gradient(145deg, #0d1117, #05070a); 
            width: 100%; max-width: 850px; border-radius: 30px;
            overflow: hidden; border: 1px solid var(--primary);
            display: flex; box-shadow: 0 0 50px rgba(0, 210, 255, 0.3);
            animation: modalPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { transform: scale(0.7) translateY(50px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        
        .modal-img-container { width: 40%; position: relative; border-right: 1px solid var(--glass-border); }
        .modal-img { width: 100%; height: 100%; object-fit: cover; }
        
        .modal-details { width: 60%; padding: 45px; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: var(--text-dim); transition: 0.3s; z-index: 10; }
        .close-modal:hover { color: var(--primary); transform: rotate(90deg); }

        .modal-title { font-family: 'Orbitron', sans-serif; color: #fff; margin: 0 0 10px; font-size: 1.8em; line-height: 1.2; }
        .modal-meta { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .modal-rating { color: #ffbc00; font-weight: 800; font-size: 1.1em; }
        .modal-quality-tag { background: rgba(0, 210, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 2px 12px; border-radius: 6px; font-size: 0.8em; font-weight: 800; }

        .modal-desc { 
            font-size: 0.95em; color: var(--text-dim); line-height: 1.8; 
            margin-bottom: 35px; max-height: 180px; overflow-y: auto; 
            padding-right: 15px;
        }

        .watch-btn { 
            display: flex; justify-content: center; align-items: center; gap: 10px;
            width: 100%; padding: 18px; text-align: center;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: #000; text-decoration: none; border-radius: 15px; font-weight: 800; 
            transition: 0.4s; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .watch-btn:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--accent-glow); filter: brightness(1.1); }

        /* 6. Floating Buttons */
        .contact-btn {
            position: fixed; bottom: 100px; right: 30px; width: 55px; height: 55px;
            background: #0088cc; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
            z-index: 2000; transition: 0.3s; text-decoration: none;
        }
        .contact-btn:hover { transform: scale(1.1) rotate(10deg); }
        .contact-btn svg { width: 28px; height: 28px; fill: white; }

        #backToTop { 
            position: fixed; bottom: 30px; right: 30px; background: var(--primary); 
            width: 55px; height: 55px; border-radius: 50%; display: none; 
            justify-content: center; align-items: center; cursor: pointer; 
            z-index: 2000; border: none; font-size: 20px; box-shadow: 0 0 20px var(--accent-glow);
        }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; height: 90vh; max-width: 90%; }
            .modal-img-container { width: 100%; height: 35%; border-right: none; border-bottom: 1px solid var(--glass-border); }
            .modal-details { width: 100%; height: 65%; padding: 25px; }
            .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .modal-title { font-size: 1.4em; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<nav id="navbar">
    <a href="#sec-myanmar">မြန်မာ 🇲🇲</a>
    <a href="#sec-japan">ဂျပန် 🇯🇵</a>
    <a href="#sec-china">တရုတ် 🇨🇳</a>
    <a href="#sec-intl">နိုင်ငံခြား 🌍</a>
</nav>

<header>
    <h1>PPGOFFICIAL</h1>
    <p style="color: var(--text-dim); margin-top: 15px; letter-spacing: 2px; font-size: 0.8em;">PREMIUM CINEMATIC EXPERIENCE</p>
</header>

<div class="search-container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-box" oninput="handleSearch()" placeholder="ဇာတ်ကားခေါင်းစဉ်ဖြင့် ရှာဖွေပါ...">
    </div>
</div>

<div class="container">
    <div id="noResult" style="display:none; text-align:center; padding:100px 0; color: var(--text-dim);">
        <h3 style="font-weight: 400;">ရှာဖွေမှု မတွေ့ရှိပါ။</h3>
    </div>

    <section id="sec-myanmar"><h2 class="category-title">MYANMAR</h2><div class="movie-grid collapsed" id="grid-myanmar"></div><button class="toggle-btn" style="display:block; margin:20px auto; background:none; border:1px solid var(--glass-border); color:var(--text-dim); padding:10px 30px; border-radius:20px; cursor:pointer;" onclick="toggleGrid('grid-myanmar', this)">View More</button></section>
    
    <section id="sec-japan"><h2 class="category-title">JAPANESE</h2><div class="movie-grid collapsed" id="grid-japan"></div><button class="toggle-btn" style="display:block; margin:20px auto; background:none; border:1px solid var(--glass-border); color:var(--text-dim); padding:10px 30px; border-radius:20px; cursor:pointer;" onclick="toggleGrid('grid-japan', this)">View More</button></section>
    
    <section id="sec-china"><h2 class="category-title">CHINESE</h2><div class="movie-grid collapsed" id="grid-china"></div><button class="toggle-btn" style="display:block; margin:20px auto; background:none; border:1px solid var(--glass-border); color:var(--text-dim); padding:10px 30px; border-radius:20px; cursor:pointer;" onclick="toggleGrid('grid-china', this)">View More</button></section>
    
    <section id="sec-intl"><h2 class="category-title">INTERNATIONAL</h2><div class="movie-grid collapsed" id="grid-intl"></div><button class="toggle-btn" style="display:block; margin:20px auto; background:none; border:1px solid var(--glass-border); color:var(--text-dim); padding:10px 30px; border-radius:20px; cursor:pointer;" onclick="toggleGrid('grid-intl', this)">View More</button></section>
</div>

<!-- Movie Modal -->
<div id="movieModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-img-container">
            <img id="modalImg" class="modal-img" src="" alt="">
        </div>
        <div class="modal-details">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="modal-title"></h2>
            <div class="modal-meta">
                <span id="modalRating" class="modal-rating">⭐ 8.5</span>
                <span id="modalQuality" class="modal-quality-tag">HD</span>
            </div>
            <p id="modalDesc" class="modal-desc"></p>
            <a id="modalLink" href="" target="_blank" class="watch-btn">
                <span>WATCH ON TELEGRAM</span>
            </a>
        </div>
    </div>
</div>

<!-- Telegram Contact -->
<a href="https://t.me/PPGOfficalbot" target="_blank" class="contact-btn">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
</a>

<button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

<script>
    let lastScroll = 0;
    const navbar = document.getElementById('navbar');

    window.addEventListener('scroll', () => {
        const cur = window.pageYOffset;
        if (cur > lastScroll && cur > 100) navbar.classList.add('nav-hide');
        else navbar.classList.remove('nav-hide');
        lastScroll = cur;
        document.getElementById("backToTop").style.display = cur > 500 ? "flex" : "none";
    });

    async function loadMovies() {
        try {
            // movies.json ကို fetch လုပ်မယ်
            const res = await fetch('movies.json');
            const movies = await res.json();
            
            const categories = ['myanmar', 'japan', 'china', 'intl'];
            
            categories.forEach(cat => {
                const grid = document.getElementById(`grid-${cat}`);
                grid.innerHTML = '';
                
                const filteredMovies = movies.filter(m => m.category === cat);
                
                filteredMovies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    
                    // NEW badge ဆိုရင် အရောင်ပြောင်းဖို့ class ထည့်မယ်
                    const qClass = movie.quality === 'NEW' ? 'quality-badge new' : 'quality-badge';
                    
                    card.innerHTML = `
                        <div class="${qClass}">${movie.quality || 'HD'}</div>
                        <img src="${movie.img}" alt="${movie.title}" loading="lazy">
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                        </div>
                    `;
                    card.onclick = () => showModal(movie);
                    grid.appendChild(card);
                });

                // ရလဒ်မရှိရင် Toggle Button ကိုဖျောက်ထားမယ်
                const toggleBtn = grid.nextElementSibling;
                if(filteredMovies.length === 0 && toggleBtn) toggleBtn.style.display = 'none';
            });
        } catch (e) { 
            console.error("Error loading JSON:", e); 
        }
    }

    function showModal(movie) {
        document.getElementById('modalImg').src = movie.img;
        document.getElementById('modalTitle').innerText = movie.title;
        document.getElementById('modalLink').href = movie.link;
        document.getElementById('modalDesc').innerText = movie.description || "ဒီဇာတ်ကားကို Telegram Channel မှာ အခမဲ့ ကြည့်ရှုနိုင်ပါတယ်။";
        document.getElementById('modalQuality').innerText = movie.quality || 'HD';
        document.getElementById('modalRating').innerText = `⭐ ${movie.rating || '8.5'}`;
        
        document.getElementById('movieModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('movieModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.movie-card');
        let hasResult = false;

        cards.forEach(card => {
            const isMatch = card.innerText.toLowerCase().includes(q);
            card.style.display = isMatch ? "block" : "none";
            if (isMatch) hasResult = true;
        });

        document.getElementById('noResult').style.display = hasResult ? "none" : "block";
        
        // ရှာဖွေနေချိန်မှာ "View More" ကြောင့် ဖျောက်ထားတာတွေကို အကုန်ဖွင့်ပေးမယ်
        if(q.length > 0) {
            document.querySelectorAll('.movie-grid').forEach(g => g.classList.remove('collapsed'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.style.display = 'none');
        } else {
            document.querySelectorAll('.movie-grid').forEach(g => g.classList.add('collapsed'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.style.display = 'block');
        }
    }

    function toggleGrid(id, btn) {
        const grid = document.getElementById(id);
        const isCol = grid.classList.toggle('collapsed');
        btn.innerText = isCol ? "View More" : "Show Less";
    }

    window.onload = loadMovies;
</script>
</body>
</html>
