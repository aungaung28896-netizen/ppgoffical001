<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPGOfficial - Premium Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d2ff;
            --bg-dark: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; 
        }

        /* Navbar */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: center; padding: 15px; gap: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 0.8em; padding: 5px 10px; }

        header { padding: 120px 20px 30px; text-align: center; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 3em; color: var(--primary); margin: 0; }

        /* Search Box */
        .search-container { display: flex; justify-content: center; padding: 20px; }
        .search-box { 
            width: 90%; max-width: 500px; padding: 15px 25px; border-radius: 30px; 
            border: 1px solid var(--primary); background: transparent; color: white; outline: none;
        }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .category-title { color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; margin: 30px 0 15px; }

        /* Movie Grid */
        .movie-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; 
        }

        .movie-card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            position: relative; transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .movie-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }

        /* Quality Badge - ဒီနေရာမှာ ပြင်ထားပါတယ် */
        .q-badge {
            position: absolute; top: 8px; left: 8px; background: var(--primary);
            color: #000; font-size: 10px; font-weight: 800; padding: 3px 8px;
            border-radius: 4px; z-index: 10; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .q-badge.new { background: #ffbc00; }

        .movie-info { padding: 10px; text-align: center; }
        .movie-title { font-size: 0.85em; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: #0f172a; width: 90%; max-width: 700px; border-radius: 20px;
            display: flex; overflow: hidden; border: 1px solid var(--primary); position: relative;
        }
        .modal-left { width: 40%; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }
        .modal-right { width: 60%; padding: 30px; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; }
        
        .watch-btn {
            display: block; width: 100%; padding: 15px; background: var(--primary);
            color: #000; text-align: center; text-decoration: none; border-radius: 10px; font-weight: 800; margin-top: 20px;
        }

        @media (max-width: 600px) {
            .modal-content { flex-direction: column; }
            .modal-left, .modal-right { width: 100%; }
            .modal-left { height: 250px; }
            .movie-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <a href="#sec-myanmar">MYANMAR</a>
    <a href="#sec-japan">JAPAN</a>
    <a href="#sec-china">CHINA</a>
    <a href="#sec-intl">INTL</a>
</nav>

<header>
    <h1>PPGOFFICIAL</h1>
</header>

<div class="search-container">
    <input type="text" id="searchBox" class="search-box" placeholder="ရှာဖွေရန်..." onkeyup="doSearch()">
</div>

<div class="container">
    <section id="sec-myanmar"><h2 class="category-title">MYANMAR</h2><div class="movie-grid" id="grid-myanmar"></div></section>
    <section id="sec-japan"><h2 class="category-title">JAPANESE</h2><div class="movie-grid" id="grid-japan"></div></section>
    <section id="sec-china"><h2 class="category-title">CHINESE</h2><div class="movie-grid" id="grid-china"></div></section>
    <section id="sec-intl"><h2 class="category-title">INTERNATIONAL</h2><div class="movie-grid" id="grid-intl"></div></section>
</div>

<div id="movieModal" class="modal" onclick="closeM()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-left"><img id="mImg" src=""></div>
        <div class="modal-right">
            <span class="close" onclick="closeM()">&times;</span>
            <h2 id="mTitle"></h2>
            <p id="mMeta" style="color:var(--primary); font-weight:bold;"></p>
            <p id="mDesc" style="color:var(--text-dim); font-size:0.9em;"></p>
            <a id="mLink" href="#" target="_blank" class="watch-btn">WATCH ON TELEGRAM</a>
        </div>
    </div>
</div>

<script>
    async function init() {
        try {
            const res = await fetch('movies.json');
            const data = await res.json();
            
            data.forEach(movie => {
                const grid = document.getElementById(`grid-${movie.category}`);
                if(grid) {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    // Quality Badge သတ်မှတ်ချက်
                    const qClass = movie.quality === 'NEW' ? 'q-badge new' : 'q-badge';
                    
                    card.innerHTML = `
                        <div class="${qClass}">${movie.quality}</div>
                        <img src="${movie.img}" alt="">
                        <div class="movie-info"><div class="movie-title">${movie.title}</div></div>
                    `;
                    card.onclick = () => openM(movie);
                    grid.appendChild(card);
                }
            });
        } catch (e) {
            console.error("JSON ဖိုင်ဖတ်မရပါ - ", e);
        }
    }

    function openM(m) {
        document.getElementById('mImg').src = m.img;
        document.getElementById('mTitle').innerText = m.title;
        document.getElementById('mMeta').innerText = `⭐ ${m.rating} | ${m.quality}`;
        document.getElementById('mDesc').innerText = m.description;
        document.getElementById('mLink').href = m.link;
        document.getElementById('movieModal').style.display = 'flex';
    }

    function closeM() {
        document.getElementById('movieModal').style.display = 'none';
    }

    function doSearch() {
        const input = document.getElementById('searchBox').value.toLowerCase();
        const cards = document.getElementsByClassName('movie-card');
        
        for (let i = 0; i < cards.length; i++) {
            const title = cards[i].innerText.toLowerCase();
            if (title.includes(input)) {
                cards[i].style.display = "block";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    window.onload = init;
</script>

</body>
</html>
